<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="tlbTitle">
  <title id="tlbTitle">The Language Blueprint LLC icon</title>

  <!-- background tile -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#122A43"/>

  <!-- subtle blueprint grid -->
  <g stroke="#FFFFFF" stroke-width="1" opacity="0.07">
    <line x1="25" y1="8" x2="25" y2="92"/>
    <line x1="50" y1="8" x2="50" y2="92"/>
    <line x1="75" y1="8" x2="75" y2="92"/>
    <line x1="8" y1="25" x2="92" y2="25"/>
    <line x1="8" y1="50" x2="92" y2="50"/>
    <line x1="8" y1="75" x2="92" y2="75"/>
  </g>

  <!-- speech-bubble / language mark -->
  <rect x="20" y="22" width="60" height="40" rx="14" fill="#E8A33D"/>
  <polygon points="32,60 24,77 45,60" fill="#E8A33D"/>

  <!-- text lines inside bubble -->
  <line x1="30" y1="34" x2="62" y2="34" stroke="#122A43" stroke-width="5" stroke-linecap="round"/>
  <line x1="30" y1="44" x2="68" y2="44" stroke="#122A43" stroke-width="5" stroke-linecap="round"/>
  <line x1="30" y1="54" x2="54" y2="54" stroke="#122A43" stroke-width="5" stroke-linecap="round"/>

  <!-- AI node accent -->
  <circle cx="74" cy="44" r="6" fill="#2BB3A3" stroke="#122A43" stroke-width="2"/>
</svg>
